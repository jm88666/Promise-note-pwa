<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ProMISe Note v4</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <script defer src="app.js"></script>
</head>
<body>
  <div class="app-header">
    <h1>ProMISe Note</h1>
  </div>
  <main>
    <div class="record-section">
      <div class="record-btn-circle" id="recordBtn">🎤</div>
      <div id="recordStatus" class="status"></div>
    </div>
    <div class="note-input">
      <textarea id="noteArea" placeholder="Typ of spreek je notitie..."></textarea>
      <button id="saveBtn">💾 Opslaan</button>
    </div>
    <section class="notes-list">
      <header class="notes-header">
        <h2>Notes</h2>
      </header>
      <ul id="savedNotes"></ul>
    </section>
  </main>
</body>
</html>
